<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#152229;
    --panel:#1D2E36;
    --panel-2:#24373F;
    --line:#3B535C;
    --text:#EDF1F0;
    --text-soft:#9FB4BC;
    --signal:#E08A3C;
    --signal-soft:#3A2C1E;
    --static:#5C6B71;
    --correct:#6FA98A;
    --wrong:#C1614F;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, rgba(224,138,60,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:44px 18px 90px;
  }
  .app{width:100%;max-width:660px;}

  .wordmark{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .wordmark-left{display:flex;align-items:baseline;gap:10px;}
  .wordmark .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:21px;
    letter-spacing:-0.01em;
  }
  .wordmark .name .dot{color:var(--signal);}
  .wordmark .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-soft);
  }
  .wordmark-right{display:flex;align-items:center;gap:10px;}
  .icon-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:50%;
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--text-soft);
    flex-shrink:0;
  }
  .icon-btn:hover{border-color:var(--signal);color:var(--signal);}
  .guide-btn{
    border-radius:16px;
    width:auto;
    padding:0 12px;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
  }

  hr.rule{border:none;border-top:1px solid var(--line);margin:16px 0 22px;}

  /* dial / progress */
  .dial-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
  }
  .freq{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--signal);
    letter-spacing:0.03em;
  }
  .level-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-soft);
    border:1px solid var(--line);
    border-radius:12px;
    padding:3px 10px;
  }
  .level-chip.pulse{animation:levelPulse .5s ease;}
  @keyframes levelPulse{0%{transform:scale(1.12);border-color:var(--signal);color:var(--signal);}100%{transform:scale(1);}}

  .bars-row{display:flex;gap:4px;align-items:flex-end;margin-bottom:26px;height:16px;}
  .bar{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:1px;
    transition:background .3s ease, border-color .3s ease;
  }
  .bar:nth-child(8n+1){height:40%;} /* unused fallback */
  .bars-row .bar{height:100%;}
  .bar.filled{border-color:transparent;}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:34px 32px;
    position:relative;
    animation:cardIn .35s ease;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* Intro */
  .intro h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:30px;
    line-height:1.2;
    margin:0 0 16px;
  }
  .intro h1 span{color:var(--signal);}
  .intro p{
    font-size:15.5px;
    line-height:1.65;
    color:var(--text-soft);
    margin:0 0 14px;
  }
  .intro .note{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--text-soft);
    border-left:2px solid var(--signal);
    padding-left:14px;
    margin:22px 0 28px;
    line-height:1.6;
  }
  .how-it-works{
    display:flex;
    gap:14px;
    margin:22px 0 26px;
  }
  .how-step{flex:1;border:1px solid var(--line);border-radius:var(--radius);padding:14px;}
  .how-step .step-num{font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--signal);letter-spacing:0.08em;margin-bottom:6px;}
  .how-step .step-desc{font-size:12.5px;color:var(--text-soft);line-height:1.5;}

  /* Vocab round */
  .stage-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--signal);
    margin-bottom:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .static-icon{width:14px;height:14px;flex-shrink:0;}
  .term-word{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:34px;
    margin:0 0 8px;
  }
  .term-sub{
    font-size:14px;
    color:var(--text-soft);
    margin:0 0 26px;
  }
  .vocab-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:6px;}
  .vocab-btn{
    text-align:left;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s ease, transform .1s ease, background .2s ease;
  }
  .vocab-btn:hover:not(:disabled){border-color:var(--signal);}
  .vocab-btn:focus-visible{outline:2px solid var(--signal); outline-offset:2px;}
  .vocab-btn:active:not(:disabled){transform:translateY(1px);}
  .vocab-btn.correct{border-color:var(--correct);background:rgba(111,169,138,0.12);}
  .vocab-btn.wrong{border-color:var(--wrong);background:rgba(193,97,79,0.12);}
  .vocab-btn:disabled{cursor:default;}
  .vocab-letter{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-soft);
    margin-right:10px;
  }

  .vocab-result{
    margin-top:20px;
    padding:16px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:var(--panel-2);
  }
  .vocab-result .rt{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:8px;
  }
  .vocab-result .rt.ok{color:var(--correct);}
  .vocab-result .rt.no{color:var(--wrong);}
  .vocab-result .rd{font-size:14px;line-height:1.6;color:var(--text-soft);}

  .next-btn{
    background:var(--signal);
    color:#1A140B;
    border:none;
    border-radius:var(--radius);
    padding:13px 22px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    margin-top:20px;
  }
  .next-btn:hover{filter:brightness(1.1);}
  .next-btn:focus-visible{outline:2px solid var(--text); outline-offset:2px;}

  .begin-btn{
    background:var(--signal);
    color:#1A140B;
    border:none;
    border-radius:var(--radius);
    padding:14px 24px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .begin-btn:hover{filter:brightness(1.1);}

  /* Scenario */
  .scenario{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:21px;
    line-height:1.45;
    margin:0 0 26px;
    color:var(--text);
  }
  .term-callout{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--signal);
    border:1px solid var(--signal);
    border-radius:12px;
    padding:3px 10px;
    margin-bottom:18px;
  }
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice-btn{
    text-align:left;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s ease, transform .1s ease;
  }
  .choice-btn:hover{border-color:var(--signal);}
  .choice-btn:focus-visible{outline:2px solid var(--signal); outline-offset:2px;}
  .choice-btn:active{transform:translateY(1px);}
  .choice-letter{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-soft);
    margin-right:10px;
  }

  /* Feedback */
  .tag{
    position:absolute;
    top:24px;
    right:28px;
    border:1.5px dashed;
    border-radius:6px;
    padding:5px 10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transform:rotate(-6deg) scale(0.6);
    opacity:0;
    animation:tagIn .45s cubic-bezier(.34,1.56,.64,1) .15s forwards;
    pointer-events:none;
  }
  @keyframes tagIn{to{opacity:.9;transform:rotate(-6deg) scale(1);}}

  .chosen-echo{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-soft);
    margin-bottom:18px;
    line-height:1.6;
  }
  .chosen-echo span{color:var(--text);}
  .feedback-text{font-size:15.5px;line-height:1.65;margin:0 0 28px;}

  .meter-wrap{margin:0 0 28px;}
  .meter-heads{
    display:flex;justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;letter-spacing:0.05em;text-transform:uppercase;
    color:var(--text-soft);margin-bottom:8px;
  }
  .meter-track{
    position:relative;height:8px;border-radius:4px;
    background:linear-gradient(to right, #C1614F, #5C6B71, #E08A3C, #6FA98A);
    border:1px solid var(--line);
  }
  .meter-knob{
    position:absolute;top:50%;width:15px;height:15px;
    background:var(--text);border:2px solid var(--panel);
    border-radius:50%;transform:translate(-50%,-50%);
    transition:left .6s cubic-bezier(.22,.9,.3,1);
    box-shadow:0 0 0 1px var(--line);
  }
  .meter-zone{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;color:var(--signal);margin-top:10px;text-align:center;
  }

  .reflect{margin:0 0 24px;}
  .reflect label{
    display:block;font-family:'IBM Plex Mono', monospace;
    font-size:11px;text-transform:uppercase;letter-spacing:0.05em;
    color:var(--text-soft);margin-bottom:8px;
  }
  .reflect textarea{
    width:100%;min-height:60px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:10px 12px;font-family:'Inter', sans-serif;font-size:14px;
    color:var(--text);resize:vertical;
  }
  .reflect textarea:focus-visible{outline:2px solid var(--signal);}
  .reflect .hint{font-size:11.5px;color:var(--text-soft);margin-top:6px;font-style:italic;}

  .kbd-hint{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--text-soft);margin-top:16px;}
  .kbd-hint kbd{border:1px solid var(--line);border-radius:3px;padding:1px 5px;background:var(--panel-2);}

  /* Summary */
  .summary h2{font-family:'Space Grotesk', sans-serif;font-weight:700;font-size:24px;margin:0 0 8px;}
  .summary .sub{font-size:13.5px;color:var(--text-soft);margin:0 0 24px;line-height:1.6;}

  .field-report{
    border:1px solid var(--signal);
    border-radius:var(--radius);
    padding:26px;
    margin-bottom:28px;
    background:var(--signal-soft);
  }
  .field-report .eyebrow{
    font-family:'IBM Plex Mono', monospace;font-size:10px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--signal);margin-bottom:10px;
  }
  .field-report .persona-row{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
  .field-report .persona-icon{width:42px;height:42px;flex-shrink:0;color:var(--signal);}
  .field-report h2{font-size:22px;margin:0;}
  .field-report p{font-size:14px;line-height:1.65;color:var(--text-soft);margin:0 0 10px;}
  .field-report .caveat{
    font-size:12px;font-style:italic;color:var(--text-soft);
    border-top:1px solid rgba(224,138,60,0.3);padding-top:10px;margin-top:14px;
  }

  .xp-summary{
    display:flex;justify-content:space-between;align-items:center;
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:26px;
  }
  .xp-summary .xs-left .xs-title{font-family:'Space Grotesk', sans-serif;font-weight:600;font-size:16px;}
  .xp-summary .xs-left .xs-sub{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--text-soft);margin-top:3px;}

  .glossary-grid{display:flex;flex-direction:column;gap:8px;margin:16px 0 28px;}
  .g-card{
    border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;background:var(--panel-2);
  }
  .g-card .g-term{font-family:'Space Grotesk', sans-serif;font-weight:600;font-size:14.5px;color:var(--signal);}
  .g-card .g-def{font-size:12.5px;color:var(--text-soft);margin-top:4px;line-height:1.5;}

  .badges-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin:16px 0 28px;}
  .achievement{
    border:1px solid var(--line);border-radius:var(--radius);padding:12px;
    display:flex;gap:10px;align-items:flex-start;background:var(--panel-2);
  }
  .achievement.locked{opacity:.4;}
  .achievement .a-icon{width:19px;height:19px;flex-shrink:0;color:var(--signal);margin-top:2px;}
  .achievement .a-title{font-size:12.5px;font-weight:600;}
  .achievement .a-desc{font-size:11px;color:var(--text-soft);line-height:1.4;margin-top:2px;}

  .log-row{
    border-top:1px solid var(--line);padding:13px 0;
    display:flex;justify-content:space-between;align-items:center;gap:16px;
  }
  .log-row:last-of-type{border-bottom:1px solid var(--line);}
  .log-left .log-case{font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.05em;}
  .log-left .log-choice{font-size:13.5px;margin-top:3px;}
  .log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  .closing{font-size:14px;line-height:1.65;color:var(--text-soft);margin:24px 0 26px;}

  .save-btn{
    background:transparent;border:1px solid var(--signal);color:var(--signal);
    border-radius:var(--radius);padding:12px 20px;
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.06em;
    text-transform:uppercase;cursor:pointer;margin-right:10px;margin-bottom:10px;
  }
  .save-btn:hover{background:var(--signal);color:#1A140B;}
  .restart-btn{
    background:var(--text);border:none;color:var(--bg);
    border-radius:var(--radius);padding:12px 20px;
    font-family:'IBM Plex Mono', monospace;font-size:12px;letter-spacing:0.06em;
    text-transform:uppercase;cursor:pointer;margin-bottom:10px;
  }
  .restart-btn:hover{background:var(--signal);}
  .replay-note{font-size:11.5px;color:var(--text-soft);font-style:italic;margin-top:10px;}

  /* Field guide modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(10,16,20,0.72);
    display:none;align-items:flex-start;justify-content:center;
    padding:60px 18px;z-index:70;overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    max-width:520px;width:100%;padding:28px;
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .modal-head h3{font-family:'Space Grotesk', sans-serif;font-size:19px;margin:0;}
  .modal-sub{font-size:12px;color:var(--text-soft);margin-bottom:18px;}
  .close-x{background:none;border:none;color:var(--text-soft);font-size:20px;cursor:pointer;line-height:1;}
  .close-x:hover{color:var(--signal);}
  .g-locked{border-style:dashed;color:var(--text-soft);}
  .g-locked .g-term{color:var(--text-soft);}

  #confetti-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;overflow:hidden;}
  .confetti-piece{position:absolute;top:-20px;opacity:0.9;animation:confettiFall linear forwards;}
  @keyframes confettiFall{to{transform:translateY(110vh) rotate(var(--rot));opacity:0;}}

  #toast-layer{position:fixed;top:20px;right:20px;z-index:60;display:flex;flex-direction:column;gap:8px;}
  .toast{
    background:var(--panel);border:1px solid var(--signal);color:var(--text);
    border-radius:var(--radius);padding:12px 16px;
    font-family:'IBM Plex Mono', monospace;font-size:11px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 14px rgba(0,0,0,.3);
    animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) forwards, toastOut .4s ease forwards 2.6s;
    max-width:240px;
  }
  .toast .toast-title{text-transform:uppercase;letter-spacing:.06em;color:var(--signal);display:block;font-size:9px;margin-bottom:2px;}
  @keyframes toastIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes toastOut{to{transform:translateX(30px);opacity:0;}}

  @media (prefers-reduced-motion: reduce){
    .meter-knob,.card,.toast,.tag,.confetti-piece,.level-chip{transition:none;animation:none;}
  }
  @media (max-width:480px){
    .card{padding:26px 22px;}
    .intro h1{font-size:25px;}
    .term-word{font-size:27px;}
    .scenario{font-size:18px;}
    .how-it-works{flex-direction:column;}
    .tag{top:16px;right:16px;font-size:9px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="wordmark">
    <div class="wordmark-left">
      <div class="name">SIGNAL<span class="dot">·</span>CHECK</div>
    </div>
    <div class="wordmark-right">
      <div class="tag">A.I. Literacy Prototype</div>
      <button class="icon-btn guide-btn" onclick="openGuide()" aria-label="Open field guide">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Field Guide
      </button>
      <button class="icon-btn" id="soundBtn" onclick="toggleSound()" aria-label="Toggle sound"></button>
    </div>
  </div>
  <hr class="rule">
  <div id="trackerWrap"></div>
  <div class="card" id="card"></div>
</div>
<div id="confetti-layer"></div>
<div id="toast-layer"></div>
<div class="modal-overlay" id="guideModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Your Field Guide</h3>
      <button class="close-x" onclick="closeGuide()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-sub">Terms unlock as you tune into them during play.</div>
    <div class="glossary-grid" id="guideList"></div>
  </div>
</div>

<script>
/* ---------------- content ---------------- */
const rounds = [
  {
    freq: "91.4",
    subject: "English",
    term: "Prompt",
    correctDef: "The instructions or question you give an A.I. Getting better results is less about \"asking\" and more about being specific about what you want, and what to leave out.",
    distractors: [
      "The A.I.'s final answer, after it finishes thinking",
      "An error message the A.I. shows when it can't help"
    ],
    prompt: "You have a strong idea for an essay but are struggling to get started.",
    calloutNote: "You just tuned in \"Prompt.\" Notice how different prompts here lead to very different amounts of actual thinking on your end.",
    choices: [
      { text: "Ask A.I. to write a full draft", meter: 8,
        feedback: "This prompt handed over the whole task, not just help getting started. You'll have words on the page, but they're not your words or your thinking." },
      { text: "Ask A.I. to generate an outline and key points", meter: 62,
        feedback: "A more precise prompt gets you a more useful result: organization, not authorship. You still have to do the writing." },
      { text: "Talk it through with a classmate", meter: 80,
        feedback: "No prompt needed here at all, and that's worth noticing. Talking an idea through with a person is one of the oldest ways to get unstuck." },
      { text: "Wait and hope inspiration comes later", meter: 40,
        feedback: "This isn't a prompting problem, it's a different one: avoidance. It doesn't outsource your thinking, but it doesn't build momentum either." }
    ]
  },
  {
    freq: "94.9",
    subject: "Math",
    term: "Training Data",

let audioCtx = null;
function getCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type, vol){
  if(!soundOn) return;
  try{
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || .06, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }catch(e){}
}
function playSelect(){ playTone(360,.09,"sine",.05); }
function playAdvance(){ playTone(440,.07,"triangle",.05); setTimeout(()=>playTone(600,.09,"triangle",.05),70); }
function playCorrect(){ [560,760].forEach((f,i)=> setTimeout(()=>playTone(f,.12,"sine",.05), i*90)); }
function playWrong(){ playTone(180,.18,"sawtooth",.04); }
function playComplete(){ [520,660,780,880].forEach((f,i)=> setTimeout(()=>playTone(f,.16,"sine",.05), i*100)); }
function playStatic(){ playTone(200 + Math.random()*100, .05, "sawtooth", .02); }

/* ---------------- helpers ---------------- */
function meterZoneLabel(v){
  if(v <= 20) return "Mostly outsourced";
  if(v <= 45) return "Leaning on A.I. more than you";
  if(v <= 65) return "A fair middle ground";
  if(v <= 85) return "You stayed in the driver's seat";
  return "Fully your own thinking";
}
function zoneColor(v){
  if(v <= 20) return "#C1614F";
  if(v <= 45) return "#5C6B71";
  if(v <= 65) return "#E08A3C";
  if(v <= 85) return "#7FA8B8";
  return "#6FA98A";
}
function levelInfo(){
  const c = stats.vocabCorrect;
  if(c <= 2) return { name:"Static", pct: c/8 };
  if(c <= 4) return { name:"Tuning In", pct: c/8 };
  if(c <= 6) return { name:"Clear Signal", pct: c/8 };
  return { name:"Full Broadcast", pct: c/8 };
}

function shuffleChoices(round){
  const opts = [
    { text: round.correctDef, correct: true },
    { text: round.distractors[0], correct: false },
    { text: round.distractors[1], correct: false }
  ];
  for(let i = opts.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return opts;
}

function renderTracker(){
  const filled = log.length;
  const lvl = levelInfo();
  let bars = "";
  for(let i=0;i<deck.length;i++){
    const has = log[i];
    bars += `<div class="bar${has ? " filled" : ""}" style="background:${has ? zoneColor(has.meter) : ""}" title="${deck[i].subject}"></div>`;
  }
  const freqNow = stage === "summary" ? deck[deck.length-1].freq : (deck[current] ? deck[current].freq : deck[0].freq);
  trackerWrap.innerHTML = `
    <div class="dial-row">
      <span class="freq">${stage === "summary" ? "SIGNAL COMPLETE" : freqNow + " FM"}</span>
      <span class="level-chip" id="levelChip">${lvl.name} · ${stats.vocabCorrect}/8 terms</span>
    </div>
    <div class="bars-row">${bars}</div>
  `;
}
function pulseLevel(){
  const chip = document.getElementById("levelChip");
  if(chip){ chip.classList.remove("pulse"); void chip.offsetWidth; chip.classList.add("pulse"); }
}

function answerVocab(i){
  if(vocabAnswered) return;
  vocabAnswered = true;
  const r = deck[current];
  const opts = r._opts;
  const isCorrect = opts[i].correct;
  document.querySelectorAll(".vocab-btn").forEach((btn, idx) => {
    btn.disabled = true;
    if(opts[idx].correct) btn.classList.add("correct");
    else if(idx === i) btn.classList.add("wrong");
  });
  unlockedTerms.add(r.id);
  if(isCorrect){
    stats.vocabCorrect++;
    playCorrect();
  } else {
    playWrong();
  }
  pulseLevel();
  renderTracker();
  checkAchievements();
  const resultWrap = document.getElementById("vocabResultWrap");
  resultWrap.innerHTML = `
    <div class="vocab-result">
      <div class="rt ${isCorrect ? "ok" : "no"}">${isCorrect ? "Signal locked" : "That was static"}</div>
      <div class="rd">${r.correctDef}</div>
    </div>
    <button class="next-btn" onclick="goToScenario()">Use this term</button>
    <div class="kbd-hint">Tip: press <kbd>Enter</kbd> to continue</div>
  `;
}

function renderScenario(){
  const r = deck[current];
  card.innerHTML = `
    <div class="stage-label">Case ${current+1} of ${deck.length} · ${r.subject}</div>
    <div class="term-callout">${r.term}</div>
    <div class="scenario">"${r.prompt}"</div>
    <div class="choices">
      ${r.choices.map((c,i) => `
        <button class="choice-btn" onclick="selectChoice(${i})">
          <span class="choice-letter">${String.fromCharCode(65+i)}</span>${c.text}
        </button>
      `).join("")}
    </div>
  `;
}

function stampText(v){
  if(v <= 20) return "Flagged";
  if(v <= 45) return "Noted";
  if(v <= 65) return "Filed";
  if(v <= 85) return "Filed clean";
  return "Case closed";
}

function renderFeedback(){
  const r = deck[current];
  const c = r.choices[choiceMade];
  const col = zoneColor(c.meter);
  card.innerHTML = `
    <div class="tag" style="border-color:${col};color:${col};">${stampText(c.meter)}</div>
    <div class="chosen-echo">You chose: <span>${c.text}</span></div>
    <div class="feedback-text">${c.feedback}</div>
    <div class="meter-wrap">
      <div class="meter-heads"><span>Outsourced</span><span>Owned</span></div>
      <div class="meter-track"><div class="meter-knob" id="knob" style="left:0%"></div></div>
      <div class="meter-zone">${meterZoneLabel(c.meter)}</div>
    </div>
    <div class="reflect">
      <label>Optional: how would you explain this choice to a teacher?</label>
      <textarea id="reflectBox" placeholder="Type a sentence or two, just for yourself..."></textarea>
      <div class="hint">Not saved. Not graded. Just a way to check your own reasoning.</div>
    </div>
    <button class="next-btn" onclick="nextRound()">${current < deck.length - 1 ? "Next frequency" : "See your signal report"}</button>
    <div class="kbd-hint">Tip: press <kbd>Enter</kbd> to continue</div>
  `;
  requestAnimationFrame(() => {
    const knob = document.getElementById("knob");
    if(knob) knob.style.left = c.meter + "%";
  });
}

function renderSummary(){
  const avg = Math.round(log.reduce((sum,e) => sum + e.meter, 0) / log.length);
  const persona = getPersona(avg);
  const lvl = levelInfo();
  const achievementsHtml = achievementDefs.map(a => `
    <div class="achievement${achUnlocked.has(a.id) ? "" : " locked"}">
      <div class="a-icon">${a.icon}</div>
      <div><div class="a-title">${a.title}</div><div class="a-desc">${achUnlocked.has(a.id) ? a.desc : "Locked · " + a.desc}</div></div>
    </div>
  `).join("");
  card.innerHTML = `
    <div class="summary">
      <div class="field-report">
        <div class="eyebrow">Your signal report</div>
        <div class="persona-row"><div class="persona-icon">${persona.icon}</div><h2>${persona.title}</h2></div>
        <p>${persona.blurb}</p>
        <div class="caveat">${persona.caveat}</div>
      </div>
      <div class="xp-summary">
        <div class="xs-left">
          <div class="xs-title">${lvl.name}</div>
          <div class="xs-sub">${stats.vocabCorrect} of 8 terms tuned correctly</div>
        </div>
      </div>
      <h2 style="font-size:18px;">Field Guide</h2>
      <div class="sub">Every term you unlocked this run, in case you want to keep it.</div>
      <div class="glossary-grid">
        ${deck.map(r => `<div class="g-card"><div class="g-term">${r.term}</div><div class="g-def">${r.correctDef}</div></div>`).join("")}
      </div>
      <h2 style="font-size:18px;">Achievements</h2>
      <div class="badges-grid">${achievementsHtml}</div>
      <h2 style="font-size:18px;">Case log</h2>
      <div class="sub">${log.length} choices, ${log.length} tradeoffs. Nothing here was right or wrong, but you could probably explain every one of them if someone asked.</div>
      ${log.map(entry => `
        <div class="log-row">
          <div class="log-left"><div class="log-case">${entry.label}</div><div class="log-choice">${entry.choiceText}</div></div>
          <div class="log-dot" style="background:${zoneColor(entry.meter)}" title="${meterZoneLabel(entry.meter)}"></div>
        </div>
      `).join("")}
      <div class="closing">These same tradeoffs show up in real classes, all year, in different clothes. The point isn't to memorize eight terms and eight answers. It's to get in the habit of asking two questions before you use A.I. on something: do I understand the tool I'm using, and will I still be able to explain how I got here? This report is a snapshot from one run, not a permanent label. Every replay deals a new frequency order.</div>
      <button class="save-btn" onclick="saveReport()">Save signal report</button>
      <button class="restart-btn" onclick="restart()">Play again</button>
      <div class="replay-note">Playing again reshuffles the frequencies and can unlock achievements you missed.</div>
    </div>
  `;
  launchConfetti();
}

function saveReport(){
  const avg = Math.round(log.reduce((sum,e) => sum + e.meter, 0) / log.length);
  const persona = getPersona(avg);
  const lvl = levelInfo();
  const canvas = document.createElement("canvas");
  canvas.width = 900; canvas.height = 620;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#152229"; ctx.fillRect(0,0,900,620);
  ctx.strokeStyle = "#E08A3C"; ctx.lineWidth = 3; ctx.strokeRect(20,20,860,580);
  ctx.fillStyle = "#E08A3C";
  ctx.font = "600 14px monospace";
  ctx.fillText("SIGNAL · CHECK — SIGNAL REPORT", 60, 90);
  ctx.fillStyle = "#EDF1F0";
  ctx.font = "700 42px Georgia, sans-serif";
  wrapText(ctx, persona.title, 60, 155, 780, 48);
  ctx.font = "16px Georgia, sans-serif";
  ctx.fillStyle = "#9FB4BC";
  wrapText(ctx, persona.blurb, 60, 225, 780, 26);
  ctx.font = "italic 14px Georgia, sans-serif";
  ctx.fillStyle = "#E08A3C";
  wrapText(ctx, persona.caveat, 60, 400, 780, 22);
  ctx.font = "600 16px monospace";
  ctx.fillStyle = "#EDF1F0";
  ctx.fillText(`${lvl.name} · ${stats.vocabCorrect}/8 A.I. terms tuned correctly`, 60, 500);
  ctx.font = "11px monospace";
  ctx.fillStyle = "#9FB4BC";
  ctx.fillText(`Based on ${log.length} cases · a snapshot, not a label`, 60, 560);

  const link = document.createElement("a");
  link.download = "signal-check-report.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(" ");
  let line = "";
  for(let n=0;n<words.length;n++){
    const test = line + words[n] + " ";
    if(ctx.measureText(test).width > maxWidth && n > 0){ ctx.fillText(line, x, y); line = words[n] + " "; y += lineHeight; }
    else { line = test; }
  }
  ctx.fillText(line, x, y);
}

function launchConfetti(){
  const layer = document.getElementById("confetti-layer");
  layer.innerHTML = "";
  const colors = ["#E08A3C", "#6FA98A", "#7FA8B8", "#EDF1F0", "#C1614F"];
  for(let i=0;i<36;i++){
    const p = document.createElement("div");
    const size = 5 + Math.random()*5;
    p.className = "confetti-piece";
    p.style.left = Math.random()*100 + "vw";
    p.style.width = size + "px";
    p.style.height = size*0.6 + "px";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty("--rot", (Math.random()*720-360) + "deg");
    p.style.animationDuration = (1.6 + Math.random()*1.2) + "s";
    p.style.animationDelay = (Math.random()*0.4) + "s";
    layer.appendChild(p);
  }
  setTimeout(() => { layer.innerHTML = ""; }, 3200);
}

/* ---------------- flow control ---------------- */
function startGame(){
  stage = "vocab";
  playAdvance();
  renderTracker();
  renderVocab();
}
function goToScenario(){
  stage = "scenario";
  playAdvance();
  renderTracker();
  renderScenario();
}
function selectChoice(i){
  choiceMade = i;
  const r = deck[current];
  const meter = r.choices[i].meter;
  log.push({ label: r.subject, choiceText: r.choices[i].text, meter: meter });
  stats.zonesTouched.add(zoneColor(meter));
  stage = "feedback";
  playSelect();
  renderTracker();
  renderFeedback();
  checkAchievements();
}
function captureReflection(){
  const box = document.getElementById("reflectBox");
  if(box && box.value.trim().length > 0){ stats.reflections++; checkAchievements(); }
}
function nextRound(){
  captureReflection();
  if(current < deck.length - 1){
    current++;
    choiceMade = null;
    stage = "vocab";
    playAdvance();
    renderTracker();
    renderVocab();
  } else {
    stage = "summary";
    playComplete();
    renderTracker();
    renderSummary();
    checkAchievements();
  }
}
function restart(){
  current = 0;
  choiceMade = null;
  stage = "intro";
  log.length = 0;
  deck = shuffledDeck();
  renderTracker();
  renderIntro();
}

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){ closeGuide(); return; }
  if(stage === "intro" && e.key === "Enter"){ startGame(); }
  else if(stage === "vocab" && ["1","2","3"].includes(e.key) && !vocabAnswered){
    stats.keyboardUses++;
    answerVocab(parseInt(e.key,10) - 1);
  }
  else if(stage === "vocab" && e.key === "Enter" && vocabAnswered){ goToScenario(); }
  else if(stage === "scenario" && ["1","2","3","4"].includes(e.key)){
    const idx = parseInt(e.key,10) - 1;
    if(deck[current] && deck[current].choices[idx]){
      stats.keyboardUses++;
      selectChoice(idx);
    }
  }
  else if(stage === "feedback" && e.key === "Enter"){ nextRound(); }
  else if(stage === "summary" && e.key === "Enter"){ restart(); }
});

renderTracker();
renderIntro();
</script>

</html>
